# ABOUTME: Builds cargo-dist macOS artifacts and publishes the GitHub Release assets.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to validate, defaults to v<Cargo package version>"
        required: false
        type: string
      update_homebrew_tap:
        description: "Update Homebrew tap for an existing stable release"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_DIST_VERSION: "0.32.0"
  PACKAGE_NAME: "tm-watcher"

jobs:
  gate:
    name: Release gates
    runs-on: macos-15-intel
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      is_tag_release: ${{ steps.release.outputs.is_tag_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "tm-watcher") | .version')"
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "Could not resolve Cargo package version for tm-watcher" >&2
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            is_tag_release="true"
          else
            tag="${{ github.event.inputs.tag || '' }}"
            if [[ -z "$tag" ]]; then
              tag="v${version}"
            fi
            is_tag_release="false"
          fi

          if [[ "$tag" != v* ]]; then
            echo "Release tag must start with v: $tag" >&2
            exit 1
          fi

          tag_version="${tag#v}"
          if [[ "$tag_version" != "$version" ]]; then
            echo "Tag version ($tag_version) does not match Cargo package version ($version)" >&2
            exit 1
          fi

          is_prerelease="false"
          if [[ "$version" == *-* ]]; then
            is_prerelease="true"
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "is_prerelease=$is_prerelease"
            echo "is_tag_release=$is_tag_release"
          } >> "$GITHUB_OUTPUT"

      - name: cargo fmt
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Version smoke
        run: cargo run -- --version

      - name: Help smoke
        run: cargo run -- --help

  build:
    name: Build ${{ matrix.target }}
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cargo-dist
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/cargo-dist"
          gh release download "v${CARGO_DIST_VERSION}" \
            --repo axodotdev/cargo-dist \
            --pattern "cargo-dist-${{ matrix.target }}.tar.xz" \
            --dir "$RUNNER_TEMP/cargo-dist"
          tar -xf "$RUNNER_TEMP/cargo-dist/cargo-dist-${{ matrix.target }}.tar.xz" -C "$RUNNER_TEMP/cargo-dist"
          echo "$RUNNER_TEMP/cargo-dist/cargo-dist-${{ matrix.target }}" >> "$GITHUB_PATH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail

          dist build \
            --tag "${{ needs.gate.outputs.tag }}" \
            --target "${{ matrix.target }}" \
            --output-format=json \
            > dist-manifest.json

          archive="target/distrib/${PACKAGE_NAME}-${{ matrix.target }}.tar.gz"
          checksum="target/distrib/${PACKAGE_NAME}-${{ matrix.target }}.tar.gz.sha256"
          release_archive="target/distrib/${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-${{ matrix.target }}.tar.gz"
          release_checksum="target/distrib/${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-${{ matrix.target }}.sha256"

          if [[ ! -f "$archive" ]]; then
            echo "Expected cargo-dist archive not found: $archive" >&2
            find target/distrib -maxdepth 1 -type f -print >&2
            exit 1
          fi
          if [[ ! -f "$checksum" ]]; then
            echo "Expected cargo-dist checksum not found: $checksum" >&2
            find target/distrib -maxdepth 1 -type f -print >&2
            exit 1
          fi

          mv "$archive" "$release_archive"
          checksum_value="$(awk '{ print $1 }' "$checksum")"
          printf "%s *%s\n" "$checksum_value" "$(basename "$release_archive")" > "$release_checksum"

          tar -tzf "$release_archive" > archive-contents.txt

          archive_root="$(awk -F/ 'NR == 1 { print $1; exit }' archive-contents.txt)"
          if [[ -z "$archive_root" ]]; then
            echo "Could not resolve archive root directory" >&2
            exit 1
          fi

          awk -v root="$archive_root" '
            $0 == root "/" { next }
            index($0, root "/") == 1 {
              path = substr($0, length(root) + 2)
              if (path != "") print path
              next
            }
            { print "__unexpected__/" $0 }
          ' archive-contents.txt | sort -u > archive-files.txt
          printf "CHANGELOG.md\nLICENSE\nREADME.md\n%s\n" "$PACKAGE_NAME" | sort > expected-archive-files.txt
          diff -u expected-archive-files.txt archive-files.txt

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            target/distrib/${{ env.PACKAGE_NAME }}-${{ needs.gate.outputs.tag }}-${{ matrix.target }}.tar.gz
            target/distrib/${{ env.PACKAGE_NAME }}-${{ needs.gate.outputs.tag }}-${{ matrix.target }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - gate
      - build
    if: ${{ needs.gate.outputs.is_tag_release == 'true' || inputs.update_homebrew_tap == true }}
    runs-on: macos-15-intel
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Verify asset set
        shell: bash
        run: |
          set -euo pipefail

          cd release-assets

          expected_arm="${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-aarch64-apple-darwin.tar.gz"
          expected_intel="${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-x86_64-apple-darwin.tar.gz"
          expected_arm_checksum="${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-aarch64-apple-darwin.sha256"
          expected_intel_checksum="${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-x86_64-apple-darwin.sha256"

          test -f "$expected_arm"
          test -f "$expected_intel"
          test -f "$expected_arm_checksum"
          test -f "$expected_intel_checksum"

          for archive in ${PACKAGE_NAME}-*.tar.gz; do
            printf "%s\n" "$archive"
          done | sort > actual-assets.txt
          printf "%s\n%s\n" "$expected_arm" "$expected_intel" | sort > expected-assets.txt
          diff -u expected-assets.txt actual-assets.txt

          cat "$expected_arm_checksum" "$expected_intel_checksum" > SHA256SUMS
          rm actual-assets.txt expected-assets.txt

      - name: Check existing release
        id: existing_release
        shell: bash
        run: |
          set -euo pipefail

          expected_arm="${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-aarch64-apple-darwin.tar.gz"
          expected_intel="${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-x86_64-apple-darwin.tar.gz"

          if gh release view "${{ needs.gate.outputs.tag }}" >/dev/null 2>&1; then
            gh release view "${{ needs.gate.outputs.tag }}" --json assets --jq '.assets[].name' | sort > existing-assets.txt
            printf "%s\n%s\nSHA256SUMS\n" "$expected_arm" "$expected_intel" | sort > expected-existing-assets.txt

            if diff -u expected-existing-assets.txt existing-assets.txt; then
              echo "Release ${{ needs.gate.outputs.tag }} already has the expected assets; skipping publish."
              echo "release_exists=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Release ${{ needs.gate.outputs.tag }} exists, but its assets do not match the expected release set." >&2
            echo "Refusing to replace or delete existing release assets." >&2
            exit 1
          fi

          echo "release_exists=false" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Require existing release for Homebrew tap repair
        if: ${{ needs.gate.outputs.is_tag_release != 'true' && steps.existing_release.outputs.release_exists != 'true' }}
        shell: bash
        run: |
          echo "workflow_dispatch Homebrew tap repair requires an existing release with the expected assets." >&2
          exit 1

      - name: Create GitHub Release
        if: ${{ needs.gate.outputs.is_tag_release == 'true' && steps.existing_release.outputs.release_exists != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          cd release-assets

          release_flags=(--verify-tag --generate-notes)
          if [[ "${{ needs.gate.outputs.is_prerelease }}" == "true" ]]; then
            release_flags+=(--prerelease --latest=false)
            printf "%s\n" \
              "This prerelease is for validating macOS daemon behavior and the release pipeline. It is not recommended for long-term regular use." \
              > "$RUNNER_TEMP/release-notes.md"
          else
            release_flags+=(--latest)
            {
              printf "%s\n" "Homebrew install:"
              printf "\n"
              printf "%s\n" '```bash'
              printf "%s\n" "brew tap zzerding/tap"
              printf "%s\n" "brew install tm-watcher"
              printf "%s\n" '```'
            } > "$RUNNER_TEMP/release-notes.md"
          fi
          release_flags+=(--notes-file "$RUNNER_TEMP/release-notes.md")

          gh release create "${{ needs.gate.outputs.tag }}" \
            "${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-aarch64-apple-darwin.tar.gz" \
            "${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-x86_64-apple-darwin.tar.gz" \
            SHA256SUMS \
            --title "${PACKAGE_NAME} ${{ needs.gate.outputs.tag }}" \
            "${release_flags[@]}"
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew-tap:
    name: Update Homebrew tap
    needs:
      - gate
      - build
      - publish
    if: ${{ needs.gate.outputs.is_prerelease != 'true' && (needs.gate.outputs.is_tag_release == 'true' || inputs.update_homebrew_tap == true) }}
    runs-on: macos-15-intel
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Check Homebrew tap token
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured." >&2
            echo "Create a fine-grained PAT scoped only to zzerding/homebrew-tap with Contents read/write, then save it as a repository secret." >&2
            exit 1
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: zzerding/homebrew-tap
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Download published checksums
        shell: bash
        run: |
          set -euo pipefail

          gh release download "${{ needs.gate.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern SHA256SUMS \
            --dir release-assets
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Render formula
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.gate.outputs.version }}"
          arm_archive="${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-aarch64-apple-darwin.tar.gz"
          intel_archive="${PACKAGE_NAME}-${{ needs.gate.outputs.tag }}-x86_64-apple-darwin.tar.gz"
          checksums_file="release-assets/SHA256SUMS"

          if [[ ! -f "$checksums_file" ]]; then
            echo "Expected published SHA256SUMS was not found." >&2
            find release-assets -maxdepth 1 -type f -print >&2
            exit 1
          fi

          arm_sha256="$(awk -v file="$arm_archive" '$2 == "*" file || $2 == file { print $1 }' "$checksums_file")"
          intel_sha256="$(awk -v file="$intel_archive" '$2 == "*" file || $2 == file { print $1 }' "$checksums_file")"
          if [[ -z "$arm_sha256" || -z "$intel_sha256" ]]; then
            echo "Published SHA256SUMS does not contain both Homebrew tarballs." >&2
            cat "$checksums_file" >&2
            exit 1
          fi

          bash source/scripts/render-homebrew-formula.sh \
            "$version" \
            "$arm_sha256" \
            "$intel_sha256" \
            homebrew-tap/Formula/tm-watcher.rb

      - name: Commit formula update
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --short -- Formula/tm-watcher.rb)" ]]; then
            echo "Formula/tm-watcher.rb is already up to date."
            exit 0
          fi

          git add Formula/tm-watcher.rb
          git commit -m "Update tm-watcher to ${{ needs.gate.outputs.version }}"
          git push origin HEAD:main
